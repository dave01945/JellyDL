name: Docker Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (example: v1.0.2)"
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/jellydl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Resolve mode and tags
        id: vars
        shell: bash
        run: |
          SHOULD_PUSH=false
          IMAGE_TAG=""

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            SHOULD_PUSH=true
            IMAGE_TAG="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            SHOULD_PUSH=true
            IMAGE_TAG="main-${GITHUB_SHA::7}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SHOULD_PUSH=true
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_TAG="ci-${GITHUB_SHA}"
          fi

          APP_VERSION="${IMAGE_TAG#v}"

          echo "should_push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.vars.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build only (no push)
        if: steps.vars.outputs.should_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.vars.outputs.app_version }}

      - name: Build and push
        if: steps.vars.outputs.should_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.app_version }}
