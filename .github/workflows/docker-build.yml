name: Docker Build

on:
  pull_request:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/jellydl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve mode and tags
        id: vars
        shell: bash
        run: |
          SHOULD_PUSH=false
          IMAGE_TAG=""

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            SHOULD_PUSH=true
            IMAGE_TAG="${GITHUB_REF_NAME}"
          else
            IMAGE_TAG="ci-${GITHUB_SHA}"
          fi

          APP_VERSION="${IMAGE_TAG#v}"

          echo "should_push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set app version (tag builds)
        if: steps.vars.outputs.should_push == 'true'
        run: npm version --no-git-tag-version "${{ steps.vars.outputs.app_version }}"

      - name: Build web assets
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.vars.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.vars.outputs.should_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_REPO }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.app_version }}

  release:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: read
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/jellydl
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Export Docker image as archive
        shell: bash
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}"
          ASSET_NAME="jellydl-${IMAGE_TAG}.tar.gz"
          CHECKSUM_NAME="${ASSET_NAME}.sha256"

          docker pull "${IMAGE_REPO}:${IMAGE_TAG}"
          docker save "${IMAGE_REPO}:${IMAGE_TAG}" | gzip > "${ASSET_NAME}"
          sha256sum "${ASSET_NAME}" > "${CHECKSUM_NAME}"

          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"
          echo "CHECKSUM_NAME=${CHECKSUM_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            Container package: https://github.com/${{ github.repository }}/pkgs/container/jellydl
            Tagged image: https://ghcr.io/${{ github.repository_owner }}/jellydl:${{ github.ref_name }}
          files: |
            ${{ env.ASSET_NAME }}
            ${{ env.CHECKSUM_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
