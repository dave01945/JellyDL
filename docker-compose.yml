services:
  jellydl:
    build:
      context: .
    image: ghcr.io/dave01945/jellydl:latest
    container_name: jellydl
    ports:
      - "8080:80"
    environment:
      # Set this to the internal URL of your Jellyfin server (e.g. http://jellyfin:8096).
      # Used by nginx to proxy /jellyfin/* requests server-side.
      JELLYFIN_INTERNAL_URL: http://jellyfin:8096
    restart: unless-stopped
